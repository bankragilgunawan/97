<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sic Bo Analyzer Pro</title>
    <link rel="manifest" href="manifest.json" />
        <style>
        :root {
            --bg: #0b0e14; --surface: #151921; --green: #089981; --red: #f23645;
            --purple: #9d4edd; --blue: #2962ff; --orange: #ff9800; --text: #d1d4dc; --border: #2a2e39;
        }
        * { box-sizing: border-box; font-family: 'Trebuchet MS', sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); overflow-x: hidden; padding-bottom: 30px; }
        .app-container { display: flex; flex-direction: column; max-width: 500px; margin: 0 auto; padding: 15px; gap: 12px; min-height: 100vh; }
        
        .stats-header { display: flex; justify-content: space-between; align-items: center; background: var(--surface); padding: 15px; border-radius: 12px; border: 1px solid var(--border); }
        #netTotal { font-size: 1.8rem; font-weight: bold; margin: 0; }
        .profit { color: var(--green); }
        .loss { color: var(--red); }

        .card { background: var(--surface); padding: 15px; border-radius: 12px; border: 1px solid var(--border); }
        
        #current-signal { 
            padding: 20px; border-radius: 15px; text-align: center; font-weight: 800; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: all 0.3s ease;
        }
        .sig-big { background: linear-gradient(135deg, #089981 0%, #056656 100%); color: white; border: 1px solid #0bd4b3; }
        .sig-small { background: linear-gradient(135deg, #f23645 0%, #b2202b 100%); color: white; border: 1px solid #ff5a67; }
        .sig-wait { background: #2a2e39; color: #787b86; }

        .dice-input-section { background: var(--surface); padding: 15px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
        .dice-inputs { display: flex; justify-content: center; gap: 10px; margin: 10px 0; }
        .dice-inputs input { width: 50px; height: 50px; text-align: center; font-size: 1.5rem; font-weight: bold; background: #1e222d; border: 2px solid var(--border); color: white; border-radius: 8px; }
        
        .log-container { background: var(--surface); border-radius: 12px; padding: 15px; border: 1px solid var(--border); }
        #historyList { height: 250px; overflow-y: auto; font-size: 0.85rem; margin-top: 10px; }
        .log-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #2a2e39; align-items: center; }
        
        .val-small { font-size: 0.7rem; color: #787b86; text-transform: uppercase; letter-spacing: 1px; }
        .btn-clear { background: none; border: 1px solid var(--red); color: var(--red); padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; }
        .btn-undo { background: none; border: 1px solid var(--orange); color: var(--orange); padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; margin-right: 5px; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        .modal.show { display: flex; }
        .modal-content { background: #1e222d; padding: 25px; border-radius: 15px; width: 90%; max-width: 380px; border: 1px solid var(--border); }
        select, input[type="number"] { width: 100%; padding: 12px; margin: 8px 0 15px; background: #131722; border: 1px solid #363a45; color: white; border-radius: 8px; }
        
        .blink { animation: blinker 1.2s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.1; } 
        }        

/* === KODE LOCK SCREEN PREMIUM (PERBAIKAN) === */
#lock-screen {
    position: fixed !important;
    inset: 0 !important; /* Menutup seluruh layar */
    background: var(--bg) !important;
    display: none; /* Akan diubah jadi 'flex' oleh JavaScript jika belum premium */
    flex-direction: column !important;
    justify-content: center !important; /* Tengahkan Vertikal */
    align-items: center !important;     /* Tengahkan Horizontal */
    z-index: 999999 !important; /* Pastikan di atas semua elemen */
    padding: 20px;
    text-align: center;
}

.lock-card {
    background: var(--surface);
    padding: 30px;
    border-radius: 20px;
    border: 1px solid var(--border);
    width: 100%;
    max-width: 350px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}

#app-pass {
    width: 100%;
    padding: 15px;
    background: #1e222d;
    border: 1px solid var(--border);
    color: white;
    border-radius: 10px;
    font-size: 1.2rem;
    text-align: center;
    margin: 20px 0;
    outline: none;
}

.btn-activate {
    width: 100%;
    padding: 15px;
    background: var(--green);
    color: white;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    font-size: 1rem;
    cursor: pointer;
}

    </style>
</head>
<body>
    <div id="lock-screen">
        <div class="lock-card">
            <h2 style="color: white; margin-bottom: 10px; font-size: 1.5rem;">PREMIUM ACCESS</h2>
            <p style="color: #888; margin-bottom: 0px; font-size: 0.9rem;">Masukkan kode aktivasi premium Anda</p>
            
            <input type="password" id="app-pass" placeholder="KODE AKTIVASI">
            
            <button class="btn-activate" onclick="checkPass()">AKTIVASI SEKARANG</button>
            
            <a href="https://wa.me/6282121218466" style="color: var(--green); display: block; margin-top: 20px; font-size: 14px; text-decoration: none;">
                Beli Lisensi Premium
            </a>
        </div>
    </div>

<div class="app-container">
    <div class="stats-header">
        <div>
            <div class="val-small">NET PROFIT (IDR)</div>
            <h2 id="netTotal">0</h2>
        </div>
        <button onclick="openSettings()" style="background:none; border:1px solid #363a45; color:#787b86; padding:8px 12px; border-radius:6px; cursor:pointer;">⚙️ SETUP</button>
    </div>

    <div class="card" style="background: linear-gradient(180deg, var(--surface) 0%, var(--bg) 100%);">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--border);">
            <div class="val-small">STATISTIK SESI</div>
            <div style="display: flex; gap: 20px;">
                <div style="text-align: right;">
                    <span style="font-size: 0.6rem; color: var(--green); display: block;">WIN</span>
                    <span id="totalWin" style="font-size: 1.2rem; font-weight: bold; color: var(--green);">0</span>
                </div>
                <div style="text-align: right;">
                    <span style="font-size: 0.6rem; color: var(--red); display: block;">LOSS</span>
                    <span id="totalLoss" style="font-size: 1.2rem; font-weight: bold; color: var(--red);">0</span>
                </div>
            </div>
        </div>
        <div id="check-items" style="font-size: 0.8rem; display: flex; flex-direction: column; gap: 8px;">
            <div style='text-align:center; opacity:0.5;'>Menunggu minimal 3 data dadu...</div>
        </div>
    </div>

    <div id="current-signal" class="sig-wait">MASUKKAN DATA AWAL</div>

    <div class="dice-input-section">
        <div class="dice-inputs">
            <input type="number" id="d1" min="1" max="6" placeholder="?">
            <input type="number" id="d2" min="1" max="6" placeholder="?">
            <input type="number" id="d3" min="1" max="6" placeholder="?">
        </div>
        <div id="stratLabel" class="val-small" style="color: var(--purple); font-weight:bold;">STRATEGY: Martingale</div>
    </div>

    <div class="log-container">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div class="val-small">HISTORI TRANSAKSI</div>
            <div>
                <button class="btn-undo" onclick="undoLast()">UNDO</button>
                <button class="btn-clear" onclick="clearData()">CLEAR</button>
            </div>
        </div>
        <div id="historyList"></div>
    </div>
</div>

<div id="settingsModal" class="modal">
    <div class="modal-content">
        <h3 style="color:white; margin-top:0;">Konfigurasi Bet & Keamanan</h3>
        
        <label class="val-small">BASE BET</label>
        <input type="number" id="baseBetInput">
        
        <label class="val-small">TARGET PROFIT (TP)</label>
        <input type="number" id="tpInput" placeholder="Misal: 500000">
        
        <label class="val-small">TRAILING STOP (TS)</label>
        <input type="number" id="tsInput" placeholder="Jaga profit jika turun (Misal: 100000)">

        <label class="val-small">STRATEGI</label>
        <select id="strategySelect">
            <option value="martingale">Martingale</option>
            <option value="parlay">Parlay</option>
            <option value="1326">System 1-3-2-6</option>
            <option value="dalembert">D'Alembert</option>
        </select>
        
        <button onclick="saveSettings()" style="width:100%; padding:12px; background:var(--purple); color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer; margin-top:10px;">SIMPAN PERUBAHAN</button>
        <button onclick="closeSettings()" style="background:none; border:none; color:#5d606b; width:100%; margin-top:10px; cursor:pointer;">Batal</button>
    </div>
</div>

<script>
         let baseBet = 10000;
    let currentBet = 10000;
    let totalNet = 0;
    let maxProfitReached = 0; // Untuk Trailing Stop
    let targetProfit = 0;     // Untuk Take Profit
    let trailingStop = 0;     // Untuk Trailing Stop
    let currentSignal = '';   // INI YANG TADI ERROR (Harus ada di sini)
    let allHistory = [];
    let chartData = [];
    let strategy = 'martingale';
    let step1326 = 0;    
    const inputs = [document.getElementById('d1'), document.getElementById('d2'), document.getElementById('d3')];

    // Fungsi Suara yang lebih stabil
    function speak(text) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel(); // Hentikan suara sebelumnya
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'id-ID';
            msg.rate = 1.0;
            msg.pitch = 1.0;
            window.speechSynthesis.speak(msg);
        }
    }

        function saveData() {
        const data = { 
            baseBet, currentBet, totalNet, allHistory, 
            chartData, currentSignal, strategy, step1326,
            maxProfitReached, targetProfit, trailingStop 
        };
        localStorage.setItem('sicbo_pro_vfinal', JSON.stringify(data));
    }

    function loadData() {
        const saved = localStorage.getItem('sicbo_pro_vfinal');
        if (saved) {
            const p = JSON.parse(saved);
            baseBet = p.baseBet || 10000; 
            currentBet = p.currentBet || 10000;
            totalNet = p.totalNet || 0;
            allHistory = p.allHistory || []; 
            chartData = p.chartData || []; 
            currentSignal = p.currentSignal || ''; 
            strategy = p.strategy || 'martingale';
            step1326 = p.step1326 || 0;
            maxProfitReached = p.maxProfitReached || 0;
            targetProfit = p.targetProfit || 0;
            trailingStop = p.trailingStop || 0;
            updateUI();
        }
    }

    inputs.forEach((input, index) => {
        input.addEventListener('input', (e) => {
            if (e.target.value.length >= 1) {
                if (index < 2) inputs[index + 1].focus();
                else submitDice();
            }
        });
    });

        function calculateNextBet(isWin) {
        const p1326 = [1, 3, 2, 6];
        // Jika sedang dalam status WAIT, jangan ubah currentBet, biarkan tetap di angka terakhir
        if (currentSignal === 'WAIT') return; 

        switch (strategy) {
            case 'martingale':
                // Reset ke awal HANYA jika benar-benar WIN
                if (isWin) {
                    currentBet = baseBet;
                } else {
                    currentBet = Math.ceil((currentBet * 2.04) / 100) * 100;
                }
                break;
                
            case 'parlay':
                currentBet = isWin ? Math.floor(currentBet * 1.97) : baseBet;
                break;
                
            case '1326':
                if (isWin) { step1326++; if (step1326 >= 4) step1326 = 0; } 
                else { step1326 = 0; }
                currentBet = baseBet * p1326[step1326];
                break;
                
            case 'dalembert':
                if (isWin) currentBet = Math.max(baseBet, currentBet - baseBet); 
                else currentBet += Math.ceil(baseBet * 1.1);
                break;
        }
    }

          function submitDice() {
    const d = inputs.map(i => parseInt(i.value));
    if (d.some(isNaN)) return;
    const total = d[0] + d[1] + d[2];
    let result = (total >= 11) ? 'BIG' : 'SMALL';

    // 1. Catat histori dengan status sinyal saat ini
    if (currentSignal !== '') {
        const isWait = (currentSignal === 'WAIT');
        const win = isWait ? false : (result === currentSignal);
        
        allHistory.unshift({
            time: new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'}),
            dice: d.join(','), total, sig: currentSignal, win, 
            betAmount: isWait ? 0 : currentBet, 
            stepState: step1326
        });

        if (!isWait) {
            if (win) totalNet += (currentBet * 0.97); 
            else totalNet -= currentBet;
            calculateNextBet(win);
        }
    }

    chartData.push({ close: total });
    
        // 2. Logika Sinyal Premium (Hybrid: MA + Loss Recovery Pola)
    if (chartData.length >= 6) {
        // Data untuk pola (p1 adalah yang terbaru)
        const last4Raw = chartData.slice(-4);
        const p1 = last4Raw[3].close >= 11 ? 'BIG' : 'SMALL';
        const p2 = last4Raw[2].close >= 11 ? 'BIG' : 'SMALL';
        const p3 = last4Raw[1].close >= 11 ? 'BIG' : 'SMALL';
        const p4 = last4Raw[0].close >= 11 ? 'BIG' : 'SMALL';

        // Hitung Moving Average
        const getMA = (p) => {
            let sum = 0; let len = chartData.length;
            for(let i = len-1; i > len-1-p; i--) sum += chartData[i].close;
            return sum / p;
        };
        const ma3 = getMA(3), ma5 = getMA(5);
        
        // Cek Riwayat Kekalahan (Hanya taruhan asli)
        const realBets = allHistory.filter(h => h.sig !== 'WAIT').slice(0, 3);
        const isTripleLoss = (realBets.length === 3 && realBets.every(h => h.win === false));
        
        // Hitung durasi WAIT setelah triple loss
        let consecutiveWait = 0;
        for (let h of allHistory) {
            if (h.sig === 'WAIT') consecutiveWait++;
            else break; 
        }

        // --- EKSEKUSI STRATEGI ---

        // JIKA LOSS 3X: Aktifkan Mode Recovery (Pola)
        if (isTripleLoss && consecutiveWait < 3) {
            currentSignal = 'WAIT'; // Berhenti dulu 3x
        } 
        else if (isTripleLoss && consecutiveWait === 3) {
            // Setelah berhenti 3x, gunakan logika pola yang Anda minta untuk 'Balas Dendam'
            if (p1 === p2 && p2 === p3 && p3 === p4) currentSignal = p1; // BBBB -> B
            else if (p1 === p2 && p2 === p3 && p3 !== p4) currentSignal = p4; // BSSS -> B
            else if (p1 !== p2 && p2 !== p3 && p3 !== p4) currentSignal = p4; // BSBS -> B
            else currentSignal = (ma3 > ma5) ? 'BIG' : 'SMALL'; // Jika pola abstrak, balik ke MA
        }
        // KONDISI NORMAL: Selalu pakai MA3 & MA5
        else {
            if (Math.abs(ma3 - ma5) < 0.15) {
                currentSignal = 'WAIT'; // Filter Sideways (Datar)
            } else {
                currentSignal = (ma3 > ma5) ? 'BIG' : 'SMALL';
            }
        }
    }
    
    // Reset Input dan Simpan Data
    inputs.forEach(i => i.value = ''); 
    inputs[0].focus();
    saveData(); 
    updateUI();
}

    function updateUI() {
        document.getElementById('netTotal').textContent = (totalNet >= 0 ? '+' : '') + new Intl.NumberFormat('id-ID').format(Math.floor(totalNet));
        document.getElementById('netTotal').className = totalNet >= 0 ? 'profit' : 'loss';
        
        const realHistory = allHistory.filter(h => h.sig !== 'WAIT');
        document.getElementById('totalWin').textContent = realHistory.filter(h => h.win).length;
        document.getElementById('totalLoss').textContent = realHistory.filter(h => !h.win).length;
        document.getElementById('stratLabel').textContent = "STRATEGY: " + strategy.toUpperCase();

        let streakCount = 0, lastSide = "", isSideways = false, signalStrength = "LOW";
        if (allHistory.length >= 1) {
            lastSide = (allHistory[0].total >= 11) ? 'BIG' : 'SMALL';
            for (let h of allHistory) { 
                if ((h.total >= 11 ? 'BIG' : 'SMALL') === lastSide) streakCount++; else break; 
            }
            if (allHistory.length >= 4) {
                const h = allHistory.slice(0, 4).map(item => (item.total >= 11 ? 'B' : 'S'));
                if (h[0] !== h[1] && h[1] !== h[2] && h[2] !== h[3]) isSideways = true;
            }
            if (currentSignal === lastSide) signalStrength = "STRONG";
        }

        const sigEl = document.getElementById('current-signal');
        if (currentSignal) {
            let formattedBet = new Intl.NumberFormat('id-ID').format(Math.ceil(currentBet));
            sigEl.innerHTML = `
                <div style="font-size: 0.7rem; opacity: 0.7; letter-spacing: 1px;">REKOMENDASI TRADE</div>
                <div style="font-size: 2rem; margin: 8px 0; letter-spacing: 3px;">${currentSignal}</div>
                <div style="border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px;">
                    <span style="font-size: 0.85rem; font-weight:bold;">BET: IDR ${currentSignal === 'WAIT' ? '0' : formattedBet}</span>
                </div>
            `;
            sigEl.className = currentSignal === 'BIG' ? 'sig-big' : (currentSignal === 'SMALL' ? 'sig-small' : 'sig-wait');
            
            // Trigger Suara Berdasarkan Sinyal Baru
            if (currentSignal === 'WAIT') speak("Harap tunggu, pola tidak stabil");
            else if (streakCount === 2) speak("Pola twin, ikuti " + currentSignal);
            else speak("Sinyal berikutnya " + currentSignal);
        }

                const checkContainer = document.getElementById('check-items');
        let checks = [];
        
        // Deteksi Pola untuk UI
        const last6 = chartData.slice(-6).map(v => v.close >= 11 ? 'B' : 'S');
        const isPingPong = last6.length >= 4 && (last6[0] !== last6[1] && last6[1] !== last6[2] && last6[2] !== last6[3]);

        if (currentSignal === 'WAIT') {
            // Tampilan Khusus saat WAIT agar user tidak nekat pasang
            let alasan = isPingPong ? "⚠️ POLA PINGPONG TERDETEKSI" : "🔍 MENCARI MOMENTUM AMAN";
            checks.push(`<div style='text-align:center; color:var(--orange); font-weight:bold; padding:15px; border:1px dashed var(--orange); border-radius:12px; background:rgba(255,152,0,0.05);'>
                <span style="font-size:0.9rem;">KESIMPULAN: JANGAN PASANG</span><br>
                <span style="font-size:0.7rem; opacity:0.8; font-weight:normal;">${alasan}</span>
            </div>`);
        } else if (currentSignal) {
            // Tampilan saat ada Sinyal (Gas)
            const isGas = (signalStrength === "STRONG" && !isSideways && !isPingPong);
            checks.push(`<div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>${isPingPong ? "🟡" : "🟢"} Tren</span> <b>${isPingPong ? 'VOLATIL' : 'STABIL'}</b></div>`);
            checks.push(`<div style="margin-top:5px; padding:12px; background:${isGas ? 'rgba(8,153,129,0.1)' : 'rgba(255,152,0,0.1)'}; border-radius:10px; text-align:center; border:1px solid ${isGas ? 'var(--green)' : 'var(--orange)'}; color:${isGas ? 'var(--green)' : 'var(--orange)'}; font-weight:bold;">
                KESIMPULAN: ${isGas ? '🚀 GAS EKSEKUSI' : '⚠️ BET MINIMAL / WAIT'}
            </div>`);
        }
        checkContainer.innerHTML = checks.join('');

        // Tampilan Histori dengan penekanan pada status OBSERVE (WAIT)
        document.getElementById('historyList').innerHTML = allHistory.slice(0, 50).map(h => `
            <div class="log-item" style="background: ${h.sig === 'WAIT' ? 'rgba(255,152,0,0.08)' : 'transparent'}; border-left: 4px solid ${h.sig === 'WAIT' ? 'var(--orange)' : (h.win ? 'var(--green)' : 'var(--red)')}; margin-bottom: 8px; padding: 12px; border-radius: 8px;">
                <div style="display:flex; flex-direction:column;">
                    <span style="font-weight:bold; letter-spacing:1px;">[${h.dice}] → ${h.total >= 11 ? 'BIG' : 'SMALL'}</span>
                    <small style="opacity:0.5; font-size:0.7rem;">${h.time} | Bet: ${h.betAmount.toLocaleString()}</small>
                </div>
                <div style="text-align:right;">
                    <div style="font-weight:bold; font-size:0.9rem; color:${h.sig === 'WAIT' ? 'var(--orange)' : (h.win ? 'var(--green)' : 'var(--red)')}">
                        ${h.sig === 'WAIT' ? 'OBSERVE' : (h.win ? 'WIN' : 'LOSS')}
                    </div>
                    <small style="opacity:0.6; font-size:0.7rem;">Sinyal: ${h.sig}</small>
                </div>
            </div>
        `).join('');
        
            // Update Profit Tertinggi (Untuk Trailing Stop)
    if (totalNet > maxProfitReached) {
        maxProfitReached = totalNet;
    }

    // Cek Kondisi Take Profit (TP)
    if (targetProfit > 0 && totalNet >= targetProfit) {
        speak("Target profit tercapai. Segera amankan kemenangan Anda.");
        document.getElementById('current-signal').innerHTML = `<div style="color:#089981">TARGET PROFIT TERLAPUI!<br>AMANKAN SALDO</div>`;
        document.getElementById('current-signal').className = 'sig-big';
    }

    // Cek Kondisi Trailing Stop (TS)
    if (trailingStop > 0 && maxProfitReached > trailingStop) {
        let batasAman = maxProfitReached - trailingStop;
        if (totalNet <= batasAman) {
            speak("Peringatan trailing stop. Profit menurun, segera berhenti.");
            document.getElementById('current-signal').innerHTML = `<div style="color:#f23645">TRAILING STOP AKTIF!<br>PROFIT TERKUNCI</div>`;
            document.getElementById('current-signal').className = 'sig-small';
        }
    }

}

        function undoLast() {
        if (allHistory.length === 0) return;
        
        // 1. Hapus data terakhir yang salah input
        allHistory.shift();
        chartData.pop();
        
        // 2. Kembalikan nominal Bet ke posisi sebelumnya
        if (allHistory.length > 0) {
            const lastData = allHistory[0];
            // Hitung ulang taruhan berikutnya berdasarkan hasil data terakhir yang ada
            if (lastData.sig !== 'WAIT') {
                calculateNextBet(lastData.win);
            } else {
                // Jika data terakhir sebelum undo adalah WAIT, tetap gunakan bet terakhir yang valid
                currentBet = currentBet; 
            }
            step1326 = lastData.stepState;
        } else {
            // Jika histori kosong setelah undo, balik ke awal
            currentBet = baseBet;
            step1326 = 0;
        }
        
        recalculateNetProfit();
        saveData(); 
        updateUI();
    }

        function saveSettings() { 
        baseBet = parseInt(document.getElementById('baseBetInput').value) || 10000; 
        targetProfit = parseInt(document.getElementById('tpInput').value) || 0;
        trailingStop = parseInt(document.getElementById('tsInput').value) || 0;
        strategy = document.getElementById('strategySelect').value;
        
        currentBet = baseBet;
        maxProfitReached = totalNet; // Reset pengunci profit
        saveData(); closeSettings(); updateUI(); 
    }

    // Update juga di dalam openSettings agar angka muncul saat dibuka
    function openSettings() { 
        document.getElementById('baseBetInput').value = baseBet; 
        document.getElementById('tpInput').value = targetProfit;
        document.getElementById('tsInput').value = trailingStop;
        document.getElementById('strategySelect').value = strategy;
        document.getElementById('settingsModal').classList.add('show'); 
    }

// 2. Fungsi untuk verifikasi password
function checkPass() {
    const pass = document.getElementById('app-pass').value;
    const kodeValid = "PREMIUM99"; 
    
    if (pass === kodeValid) {
        localStorage.setItem("statusPremium", "aktif");
        document.getElementById('lock-screen').style.display = 'none';
        alert("Selamat! Akses Premium Aktif Selamanya.");
    } else {
        alert("Kode Salah atau Kadaluarsa!");
    }
}

// Fungsi Tambahan untuk menghitung ulang profit (PENTING)
function recalculateNetProfit() {
    totalNet = 0;
    allHistory.forEach(h => {
        if (h.sig !== 'WAIT') {
            if (h.win) totalNet += (h.betAmount * 0.97);
            else totalNet -= h.betAmount;
        }
    });
}

function closeSettings() { 
    document.getElementById('settingsModal').classList.remove('show'); 
}

function clearData() { 
    if (confirm("Reset seluruh data sesi?")) { 
        localStorage.removeItem('sicbo_pro_vfinal'); 
        location.reload(); 
    } 
}

// === EKSEKUSI SAAT START ===
window.onload = function() {
    // Cek Status Premium
    const isPremium = localStorage.getItem("statusPremium");
    if (isPremium === "aktif") {
        document.getElementById("lock-screen").style.display = "none";
    } else {
        document.getElementById("lock-screen").style.display = "flex";
    }
    
    // Load Data Tersimpan
    loadData();
};

if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
      navigator.serviceWorker.register('service-worker.js').then(function(reg) {
        console.log('ServiceWorker registration successful');
      }, function(err) {
        console.log('ServiceWorker registration failed: ', err);
      });
    });
    }

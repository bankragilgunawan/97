        <style>
        :root {
            --bg: #0b0e14; --surface: #151921; --green: #089981; --red: #f23645;
            --purple: #9d4edd; --blue: #2962ff; --orange: #ff9800; --text: #d1d4dc; --border: #2a2e39;

        * { box-sizing: border-box; font-family: 'Trebuchet MS', sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); overflow-x: hidden; padding-bottom: 30px; }

        .profit { color: var(--green); }
        .loss { color: var(--red); }

        .card { background: var(--surface); padding: 15px; border-radius: 12px; border: 1px solid var(--border); }
        
        #current-signal { 
            padding: 20px; border-radius: 15px; text-align: center; font-weight: 800; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: all 0.3s ease;
        }
        .sig-big { background: linear-gradient(135deg, #089981 0%, #056656 100%); color: white; border: 1px solid #0bd4b3; }
        .sig-small { background: linear-gradient(135deg, #f23645 0%, #b2202b 100%); color: white; border: 1px solid #ff5a67; }
        .sig-wait { background: #2a2e39; color: #787b86; }

        .dice-input-section { background: var(--surface); padding: 15px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
        .dice-inputs { display: flex; justify-content: center; gap: 10px; margin: 10px 0; }
        .dice-inputs input { width: 50px; height: 50px; text-align: center; font-size: 1.5rem; font-weight: bold; background: #1e222d; border: 2px solid var(--border); color: white; border-radius: 8px; }
        
        .log-container { background: var(--surface); border-radius: 12px; padding: 15px; border: 1px solid var(--border); }
        #historyList { height: 250px; overflow-y: auto; font-size: 0.85rem; margin-top: 10px; }
        .log-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #2a2e39; align-items: center; }
        
        .val-small { font-size: 0.7rem; color: #787b86; text-transform: uppercase; letter-spacing: 1px; }
        .btn-clear { background: none; border: 1px solid var(--red); color: var(--red); padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; }
        .btn-undo { background: none; border: 1px solid var(--orange); color: var(--orange); padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; margin-right: 5px; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        .modal.show { display: flex; }
        .modal-content { background: #1e222d; padding: 25px; border-radius: 15px; width: 90%; max-width: 380px; border: 1px solid var(--border); }
        select, input[type="number"] { width: 100%; padding: 12px; margin: 8px 0 15px; background: #131722; border: 1px solid #363a45; color: white; border-radius: 8px; }
        
        .blink { animation: blinker 1.2s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.1; } 
        }

<script>
         let baseBet = 10000;
    let currentBet = 10000;
    let totalNet = 0;
    let maxProfitReached = 0; // Untuk Trailing Stop
    let targetProfit = 0;     // Untuk Take Profit
    let trailingStop = 0;     // Untuk Trailing Stop
    let currentSignal = '';   // INI YANG TADI ERROR (Harus ada di sini)
    let allHistory = [];
    let chartData = [];
    let strategy = 'martingale';
    let step1326 = 0;
    let twinGap = 0;    
    const inputs = [document.getElementById('d1'), document.getElementById('d2'), document.getElementById('d3')];

    // Fungsi Suara yang lebih stabil
    function speak(text) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel(); // Hentikan suara sebelumnya
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'id-ID';
            msg.rate = 1.0;
            msg.pitch = 1.0;
            window.speechSynthesis.speak(msg);
        }
    }

<!-- Save Data -->
        function saveData() {
    const data = { 
        baseBet, currentBet, totalNet, allHistory, 
        chartData, currentSignal, strategy, step1326,
        maxProfitReached, targetProfit, trailingStop,
        twinGap // <--- TAMBAHKAN INI AGAR JARAK TWIN TERSIMPAN
    };
    localStorage.setItem('sicbo_pro_vfinal', JSON.stringify(data));
}

<!-- Load Data -->
    function loadData() {
        const saved = localStorage.getItem('sicbo_pro_vfinal');
        if (saved) {
            const p = JSON.parse(saved);
            baseBet = p.baseBet || 10000; 
            currentBet = p.currentBet || 10000;
            totalNet = p.totalNet || 0;
            allHistory = p.allHistory || []; 
            chartData = p.chartData || []; 
            currentSignal = p.currentSignal || ''; 
            strategy = p.strategy || 'martingale';
            step1326 = p.step1326 || 0;
            maxProfitReached = p.maxProfitReached || 0;
            targetProfit = p.targetProfit || 0;
            trailingStop = p.trailingStop || 0;
            step1326 = p.step1326 || 0;
        twinGap = p.twinGap || 0;
            updateUI();
        }
    }

    inputs.forEach((input, index) => {
        input.addEventListener('input', (e) => {
            if (e.target.value.length >= 1) {
                if (index < 2) inputs[index + 1].focus();
                else submitDice();
            }
        });
    });

<!-- Calculate Next Bet -->
        function calculateNextBet(isWin) {
        const p1326 = [1, 3, 2, 6];
        // Jika sedang dalam status WAIT, jangan ubah currentBet, biarkan tetap di angka terakhir
        if (currentSignal === 'WAIT') return; 

        switch (strategy) {
            case 'martingale':
                // Reset ke awal HANYA jika benar-benar WIN
                if (isWin) {
                    currentBet = baseBet;
                } else {
                    currentBet = Math.ceil((currentBet * 2.04) / 100) * 100;
                }
                break;
                
            case 'parlay':
                currentBet = isWin ? Math.floor(currentBet * 1.97) : baseBet;
                break;
                
            case '1326':
                if (isWin) { step1326++; if (step1326 >= 4) step1326 = 0; } 
                else { step1326 = 0; }
                currentBet = baseBet * p1326[step1326];
                break;
                
            case 'dalembert':
                if (isWin) currentBet = Math.max(baseBet, currentBet - baseBet); 
                else currentBet += Math.ceil(baseBet * 1.1);
                break;
        }
    }

<!-- Submit Dice -->
          function submitDice() {
    const d = inputs.map(i => parseInt(i.value));
    if (d.some(isNaN)) return;

    // --- 1. LOGIKA DETEKSI TWIN ---
    const isTwin = (d[0] === d[1] || d[1] === d[2] || d[0] === d[2]);
    const total = d[0] + d[1] + d[2];
    
    if (isTwin) {
        twinGap = 0; 
    } else {
        twinGap++; 
    }

    if (twinGap >= 7) {
        speak("Peringatan, dadu kembar sudah tidak keluar selama " + twinGap + " kali. Hati-hati.");
    }

    let result = (total >= 11) ? 'BIG' : 'SMALL';

    // --- 2. PENCATATAN HISTORI & PROFIT ---
    if (currentSignal !== '') {
        const isWait = (currentSignal === 'WAIT' || currentSignal === '');
        const win = isWait ? false : (result === currentSignal);
        
        allHistory.unshift({
            time: new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'}),
            dice: d.join(','), 
            total, 
            sig: currentSignal, 
            win, 
            betAmount: isWait ? 0 : currentBet, 
            stepState: step1326,
            currentTwinGap: twinGap 
        });

        if (!isWait) {
            if (win) totalNet += (currentBet * 0.97); 
            else totalNet -= currentBet;
            calculateNextBet(win);
        }
    }

    chartData.push({ close: total });
    
    // --- 3. ANALISIS TREN (MOVING AVERAGE) ---
    let maSignal = 'WAIT';
    if (chartData.length >= 6) {
        const getMA = (p) => {
            let sum = 0; let len = chartData.length;
            for(let i = len-1; i > len-1-p; i--) sum += chartData[i].close;
            return sum / p;
        };
        const ma3 = getMA(3), ma5 = getMA(5);
        
        if (Math.abs(ma3 - ma5) < 0.15) {
            maSignal = 'WAIT';
        } else {
            maSignal = (ma3 > ma5) ? 'BIG' : 'SMALL';
        }

        // Cek Recovery Mode (Setelah Loss 3x)
        const realBets = allHistory.filter(h => h.sig !== 'WAIT').slice(0, 3);
        const isTripleLoss = (realBets.length === 3 && realBets.every(h => h.win === false));
        if (isTripleLoss) {
            let consecutiveWait = 0;
            for (let h of allHistory) { if (h.sig === 'WAIT') consecutiveWait++; else break; }
            if (consecutiveWait < 3) maSignal = 'WAIT';
        }
    }

    // --- 4. ANALISIS HISTORY (PATTERN MEMORY) ---
    let patternSignal = null;
    if (allHistory.length > 2) {
        const currentDiceStr = [...d].sort().join(','); 
        
        // Cari di history mulai dari data ke-2 (karena data ke-0 adalah yang baru kita unshift)
        for (let i = 1; i < allHistory.length - 1; i++) {
            const histDiceStr = allHistory[i].dice.split(',').map(Number).sort().join(',');
            
            if (currentDiceStr === histDiceStr) {
                // Jika ketemu dadu sama, lihat hasil putaran setelahnya (i-1)
                patternSignal = allHistory[i-1].total >= 11 ? 'BIG' : 'SMALL';
                break; 
            }
        }
    }

    // --- 5. FINAL DECISION (FILTER BENTROK) ---
    if (patternSignal && maSignal !== 'WAIT') {
        if (maSignal === patternSignal) {
            currentSignal = maSignal; // Sinyal Kuat (MA & History Sinkron)
            speak("Sinyal kuat, pola history mendukung tren " + currentSignal);
        } else {
            currentSignal = 'WAIT'; // Bentrok! (MA & History beda arah)
            speak("Sinyal bentrok, lebih baik tunggu.");
        }
    } else {
        currentSignal = maSignal; // Gunakan MA jika pattern tidak ditemukan
        if (currentSignal !== 'WAIT') speak("Sinyal berikutnya " + currentSignal);
    }
    
    // --- 6. CLEAN UP & SAVE ---
    inputs.forEach(i => i.value = ''); 
    inputs[0].focus();
    saveData(); 
    updateUI();
}

<!-- Update Ui -->
    function updateUI() {
    document.getElementById('netTotal').textContent = (totalNet >= 0 ? '+' : '') + new Intl.NumberFormat('id-ID').format(Math.floor(totalNet));
    document.getElementById('netTotal').className = totalNet >= 0 ? 'profit' : 'loss';
    
    const realHistory = allHistory.filter(h => h.sig !== 'WAIT');
    document.getElementById('totalWin').textContent = realHistory.filter(h => h.win).length;
    document.getElementById('totalLoss').textContent = realHistory.filter(h => !h.win).length;
    document.getElementById('stratLabel').textContent = "STRATEGY: " + strategy.toUpperCase();

    // Logika Sinyal Visual
    const sigEl = document.getElementById('current-signal');
    if (currentSignal) {
        let formattedBet = new Intl.NumberFormat('id-ID').format(Math.ceil(currentBet));
        sigEl.innerHTML = `
            <div style="font-size: 0.7rem; opacity: 0.7; letter-spacing: 1px;">REKOMENDASI TRADE</div>
            <div style="font-size: 2rem; margin: 8px 0; letter-spacing: 3px;">${currentSignal}</div>
            <div style="border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px;">
                <span style="font-size: 0.85rem; font-weight:bold;">BET: IDR ${currentSignal === 'WAIT' ? '0' : formattedBet}</span>
            </div>
        `;
        sigEl.className = currentSignal === 'BIG' ? 'sig-big' : (currentSignal === 'SMALL' ? 'sig-small' : 'sig-wait');
    }

    // --- RENDER HISTORY LIST DENGAN WARNA ---
    const historyList = document.getElementById('historyList');
    historyList.innerHTML = allHistory.map(h => {
        let statusColor = '#787b86'; // Abu-abu default
        let statusText = 'OBSERVE';
        let betValue = 'IDR 0';

        if (h.sig !== 'WAIT' && h.sig !== '') {
            statusColor = h.win ? 'var(--green)' : 'var(--red)';
            statusText = h.win ? 'WIN' : 'LOSS';
            betValue = 'IDR ' + new Intl.NumberFormat('id-ID').format(h.betAmount);
        }

        return `
            <div class="log-item" style="border-left: 4px solid ${statusColor}; padding: 10px; margin-bottom: 8px; background: rgba(255,255,255,0.03); display: flex; justify-content: space-between; align-items: center; border-radius: 6px;">
                <div style="flex: 1;">
                    <div style="font-weight:bold; color:white;">[${h.dice}]</div>
                    <div style="font-size:0.7rem; opacity:0.5;">${h.time}</div>
                </div>
                
                <div style="flex: 1; text-align: center;">
                    <div style="font-weight:bold; color:${statusColor}; font-size:0.9rem;">${betValue}</div>
                    <div style="font-size:0.6rem; letter-spacing:1px; color:${statusColor}; opacity:0.8;">${statusText}</div>
                </div>

                <div style="flex: 1; text-align: right;">
                    <div style="font-weight:bold; color:${h.sig === 'BIG' ? 'var(--green)' : (h.sig === 'SMALL' ? 'var(--red)' : 'white')}">${h.sig}</div>
                    <div style="font-size:0.6rem; opacity:0.4;">SIGNAL</div>
                </div>
            </div>
        `;
    }).join('');

    // --- RENDER INDIKATOR TWIN & STATS ---
    const checkContainer = document.getElementById('check-items');
    let checks = [];
    let twinColor = twinGap >= 7 ? 'var(--red)' : 'var(--text)';
    let twinWarning = twinGap >= 7 ? ' <span class="blink" style="color:var(--red); font-size:0.7rem;">(RAWAN!)</span>' : '';
    
    checks.push(`
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span class="val-small">💎 TWIN GAP</span>
            <b style="color:${twinColor};">${twinGap} Putaran${twinWarning}</b>
        </div>
    `);
    checkContainer.innerHTML = checks.join('');
}

<!-- undoLast -->
        function undoLast() {
    if (allHistory.length === 0) return;
    
    // 1. Hapus data terakhir dari history dan chart
    allHistory.shift();
    chartData.pop();
    
    // 2. Kembalikan state data (Bet & Twin Gap)
    if (allHistory.length > 0) {
        const lastData = allHistory[0];
        
        // KEMBALIKAN JARAK KEMBAR (Twin Gap)
        // Kita ambil dari properti 'currentTwinGap' yang sudah Anda simpan di submitDice
        twinGap = lastData.currentTwinGap || 0;

        // Hitung ulang taruhan berikutnya berdasarkan data terakhir yang tersisa
        if (lastData.sig !== 'WAIT' && lastData.sig !== '') {
            calculateNextBet(lastData.win);
        } else {
            // Jika data sebelumnya adalah WAIT, tetap pada bet terakhir
            currentBet = currentBet; 
        }
        
        // Kembalikan step strategi (khusus 1-3-2-6)
        step1326 = lastData.stepState || 0;
    } else {
        // Jika histori kosong total setelah undo, reset semua ke awal
        currentBet = baseBet;
        step1326 = 0;
        twinGap = 0;
    }
    
    // 3. Sinkronisasi ulang profit dan simpan ke memori
    recalculateNetProfit();
    saveData(); 
    updateUI();
}

<!-- saveSettings -->
        function saveSettings() { 
        baseBet = parseInt(document.getElementById('baseBetInput').value) || 10000; 
        targetProfit = parseInt(document.getElementById('tpInput').value) || 0;
        trailingStop = parseInt(document.getElementById('tsInput').value) || 0;
        strategy = document.getElementById('strategySelect').value;
        
        currentBet = baseBet;
        maxProfitReached = totalNet; // Reset pengunci profit
        saveData(); closeSettings(); updateUI(); 
    }

    // Update juga di dalam openSettings agar angka muncul saat dibuka
    function openSettings() { 
        document.getElementById('baseBetInput').value = baseBet; 
        document.getElementById('tpInput').value = targetProfit;
        document.getElementById('tsInput').value = trailingStop;
        document.getElementById('strategySelect').value = strategy;
        document.getElementById('settingsModal').classList.add('show'); 
    }

// Fungsi Tambahan untuk menghitung ulang profit (PENTING)
function recalculateNetProfit() {
    totalNet = 0;
    allHistory.forEach(h => {
        if (h.sig !== 'WAIT') {
            if (h.win) totalNet += (h.betAmount * 0.97);
            else totalNet -= h.betAmount;
        }
    });
}

function closeSettings() { 
    document.getElementById('settingsModal').classList.remove('show'); 
}

function clearData() { 
    if (confirm("Reset seluruh data sesi?")) { 
        localStorage.removeItem('sicbo_pro_vfinal'); 
        location.reload(); 
    } 
}

// === EKSEKUSI SAAT START ===
window.onload = function() {
    // Cek Status Premium dari LocalStorage
    const status = localStorage.getItem("statusPremium");
    
    if (status === "aktif") {
        document.getElementById("lock-screen").style.display = "none";
    } else {
        // Jika belum aktif, pastikan layar kunci muncul menutupi segalanya
        document.getElementById("lock-screen").style.display = "flex";
        // Fokuskan kursor langsung ke kotak password
        document.getElementById("app-pass").focus();
    }
    
    // Tetap jalankan fungsi muat data history
    loadData();
};

if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
      navigator.serviceWorker.register('service-worker.js').then(function(reg) {
        console.log('ServiceWorker registration successful');
      }, function(err) {
        console.log('ServiceWorker registration failed: ', err);
      });
    });
    }
</script>

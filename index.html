<head>

        <style>
        :root {
            --bg: #0b0e14; --surface: #151921; --green: #089981; --red: #f23645;
            --purple: #9d4edd; --blue: #2962ff; --orange: #ff9800; --text: #d1d4dc; --border: #2a2e39;
        }
        * { box-sizing: border-box; font-family: 'Trebuchet MS', sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); overflow-x: hidden; padding-bottom: 30px; }
        .app-container { display: flex; flex-direction: column; max-width: 500px; margin: 0 auto; padding: 15px; gap: 12px; min-height: 100vh;
    position: relative; /* Wajib ada agar z-index berfungsi */
    z-index: 1; /* Lebih tinggi dari lampu (-1) */
}

        .stats-header { display: flex; justify-content: space-between; align-items: center; background: var(--surface); padding: 15px; border-radius: 12px; border: 1px solid var(--border); }
        #netTotal { font-size: 1.8rem; font-weight: bold; margin: 0; }
        .profit { color: var(--green); }
        .loss { color: var(--red); }

        .card { background: var(--surface); padding: 15px; border-radius: 12px; border: 1px solid var(--border); }
        
        #current-signal { 
            padding: 20px; border-radius: 15px; text-align: center; font-weight: 800; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: all 0.3s ease;
        }
        .sig-big { background: linear-gradient(135deg, #089981 0%, #056656 100%); color: white; border: 1px solid #0bd4b3; }
        .sig-small { background: linear-gradient(135deg, #f23645 0%, #b2202b 100%); color: white; border: 1px solid #ff5a67; }
        .sig-wait { background: #2a2e39; color: #787b86; }

        .dice-input-section { background: var(--surface); padding: 15px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
        .dice-inputs { display: flex; justify-content: center; gap: 10px; margin: 10px 0; }
        .dice-inputs input { width: 50px; height: 50px; text-align: center; font-size: 1.5rem; font-weight: bold; background: #1e222d; border: 2px solid var(--border); color: white; border-radius: 8px; }
        
        .log-container { background: var(--surface); border-radius: 12px; padding: 15px; border: 1px solid var(--border); }
        #historyList { height: 250px; overflow-y: auto; font-size: 0.85rem; margin-top: 10px; }
        .log-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #2a2e39; align-items: center; }
        
        .val-small { font-size: 0.7rem; color: #787b86; text-transform: uppercase; letter-spacing: 1px; }
        .btn-clear { background: none; border: 1px solid var(--red); color: var(--red); padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; }
        .btn-undo { background: none; border: 1px solid var(--orange); color: var(--orange); padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; margin-right: 5px; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        .modal.show { display: flex; }
        .modal-content { background: #1e222d; padding: 25px; border-radius: 15px; width: 90%; max-width: 380px; border: 1px solid var(--border); }
        select, input[type="number"] { width: 100%; padding: 12px; margin: 8px 0 15px; background: #131722; border: 1px solid #363a45; color: white; border-radius: 8px; }
        
        .blink { animation: blinker 1.2s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.1; } 
        }        

/* === KODE LOCK SCREEN INTERAKTIF (PULL CHAIN) === */
#lock-screen {
    position: fixed;
    inset: 0;
    background: #05070a; /* Gelap total sebelum lampu nyala */
    display: none;
    flex-direction: column;
    align-items: center;
    z-index: 999999;
    transition: background 0.5s ease;
}

/* Area Lampu */
.lamp-container {
    position: relative;
    width: 100%;
    height: 300px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* Kabel Lampu */
.wire {
    width: 4px;
    height: 100px;
    background: #222;
}

/* Kap Lampu */
.bulb-holder {
    width: 60px;
    height: 40px;
    background: #333;
    border-radius: 5px;
    position: relative;
    z-index: 2;
}

/* Bohlam */
#bulb {
    width: 80px;
    height: 80px;
    background: #1a1a1a;
    border-radius: 50%;
    margin-top: -10px;
    transition: all 0.3s ease;
    border: 2px solid #222;
}

/* Tali Penarik */
.pull-chain {
    width: 4px;
    height: 150px;
    background: #555;
    position: absolute;
    top: 100px;
    right: calc(50% - 40px);
    cursor: pointer;
    transition: height 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.pull-chain:active { height: 170px; }

.handle {
    width: 15px;
    height: 30px;
    background: #888;
    border-radius: 10px;
    position: absolute;
    bottom: 0;
}

/* Konten Form yang Tersembunyi */
.lock-card {
    opacity: 0;
    transform: translateY(30px) scale(0.9);
    transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    background: rgba(15, 20, 28, 0.95); /* Hitam pekat transparan */
    backdrop-filter: blur(10px);
    padding: 40px 25px;
    border-radius: 30px;
    border: 1px solid #333;
    width: 90%;
    max-width: 360px;
    text-align: center;
    pointer-events: none;
    box-shadow: 0 20px 50px rgba(0,0,0,0.8);
}

/* Input Kode Bergaya Brankas Digital */
#app-pass {
    width: 100%;
    height: 70px;
    background: #000 !important;
    border: 1px solid #444 !important;
    border-bottom: 4px solid #ffcc00 !important; /* Garis bawah emas */
    color: #ffcc00 !important;
    font-family: 'Courier New', monospace;
    font-size: 2rem;
    letter-spacing: 15px; /* Jarak bintang lebar */
    text-align: center;
    border-radius: 12px;
    margin: 25px 0;
    outline: none;
    transition: all 0.3s;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
}

#app-pass:focus {
    border-color: #ffcc00 !important;
    box-shadow: 0 0 20px rgba(255, 204, 0, 0.2);
}

/* Tombol Aktivasi Bergaya Pill (Lonjong) dengan Efek Pulse */
.btn-activate {
    width: 100%;
    height: 60px;
    background: #1a1a1a;
    color: #ffcc00 !important;
    border: 2px solid #ffcc00;
    border-radius: 50px; /* Bentuk lonjong */
    font-weight: 800;
    font-size: 1.1rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    position: relative;
    overflow: hidden;
}

/* Efek cahaya berdenyut pada tombol */
.btn-activate::after {
    content: "";
    position: absolute;
    width: 100%; height: 100%;
    background: rgba(255, 204, 0, 0.1);
    animation: pulseBtn 2s infinite;
}

@keyframes pulseBtn {
    0% { opacity: 0.8; transform: scale(1); }
    50% { opacity: 0.3; transform: scale(1.05); }
    100% { opacity: 0.8; transform: scale(1); }
}

.btn-activate:hover {
    background: #ffcc00;
    color: #000 !important;
    box-shadow: 0 0 30px rgba(255, 204, 0, 0.5);
}

/* SAAT LAMPU MENYALA */
.light-on #lock-screen { background: #0b0e14; }
.light-on #bulb { 
    background: #ffcc00; 
    box-shadow: 0 0 100px #ffcc00, 0 0 200px rgba(255,204,0,0.4);
    border-color: #fff;
}
.light-on .lock-card { 
    opacity: 1; 
    transform: translateY(0); 
    pointer-events: auto;
}

/* --- 1. SISTEM LAMPU (DI BELAKANG MENU) --- */
.ambient-light-system {
    position: fixed;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 500px;
    height: 100vh;
    pointer-events: none;
    z-index: -1; /* Berada di belakang menu */
    display: flex;
    flex-direction: column;
    align-items: center;
}

.bg-wire {
    width: 2px;
    height: 150px;
    background: #222;
}

#bg-bulb {
    width: 60px;
    height: 60px;
    background: #1a1a1a;
    border-radius: 50%;
    transition: all 0.4s ease;
    border: 2px solid #222;
    opacity: 0.3;
}

/* --- 2. SAKLAR TARIK (DI DEPAN MENU) --- */
.bg-pull-chain {
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    top: 210px; /* Posisi tepat di bawah bohlam */
    width: 40px; /* Area sentuh diperlebar agar mudah diklik */
    height: 45px; /* Pendek seukuran tombol */
    cursor: pointer;
    z-index: 9999; /* Berada di depan menu agar bisa diklik */
    display: flex;
    justify-content: center;
    pointer-events: auto;
    transition: transform 0.1s;
}

/* Tali kecil penghubung handle */
.bg-pull-chain::before {
    content: "";
    width: 2px;
    height: 15px;
    background: #444;
}

.bg-handle {
    width: 14px;
    height: 28px;
    background: #888;
    border-radius: 7px;
    position: absolute;
    bottom: 0;
    box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    border: 1px solid #555;
}

/* Efek saat ditarik */
.bg-pull-chain:active {
    transform: translateX(-50%) translateY(5px);
}

/* --- 3. EFEK CAHAYA (SUPER TERANG) --- */
.light-mode-on #bg-bulb {
    background: #fff000; /* Kuning murni paling terang */
    opacity: 1.0;
    /* Gabungan 3 lapis shadow agar cahaya sangat pekat dan luas */
    box-shadow: 
        0 0 50px 20px #fff,               /* Cahaya inti putih */
        0 0 150px 60px rgba(255, 240, 0, 0.9), /* Pendaran kuning utama */
        0 0 300px 100px rgba(255, 200, 0, 0.4); /* Cahaya sebar luas */
    border-color: #fff;
}

.light-mode-on .app-container {
    /* Meningkatkan kontras warna latar belakang saat lampu menyala */
    background: radial-gradient(circle at center 200px, #3a4252 0%, #0b0e14 90%) !important;
}

/* Menambahkan efek glow pada teks menu agar terlihat terkena cahaya dari belakang */
.light-mode-on .card, 
.light-mode-on .stats-header {
    border-color: rgba(255, 240, 0, 0.3) !important;
    box-shadow: 0 0 20px rgba(255, 240, 0, 0.1);
}

    </style>

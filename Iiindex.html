<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sic Bo Analyzer Pro</title>
    <link rel="manifest" href="manifest.json" />
        <style>
        :root {
            --bg: #0b0e14; --surface: #151921; --green: #089981; --red: #f23645;
            --purple: #9d4edd; --blue: #2962ff; --orange: #ff9800; --text: #d1d4dc; --border: #2a2e39;
        }
        * { box-sizing: border-box; font-family: 'Trebuchet MS', sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); overflow-x: hidden; padding-bottom: 30px; }
        .app-container { display: flex; flex-direction: column; max-width: 500px; margin: 0 auto; padding: 15px; gap: 12px; min-height: 100vh; }
        
        .stats-header { display: flex; justify-content: space-between; align-items: center; background: var(--surface); padding: 15px; border-radius: 12px; border: 1px solid var(--border); }
        #netTotal { font-size: 1.8rem; font-weight: bold; margin: 0; }
        .profit { color: var(--green); }
        .loss { color: var(--red); }

        .card { background: var(--surface); padding: 15px; border-radius: 12px; border: 1px solid var(--border); }
        
        #current-signal { 
            padding: 20px; border-radius: 15px; text-align: center; font-weight: 800; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: all 0.3s ease;
        }
        .sig-big { background: linear-gradient(135deg, #089981 0%, #056656 100%); color: white; border: 1px solid #0bd4b3; }
        .sig-small { background: linear-gradient(135deg, #f23645 0%, #b2202b 100%); color: white; border: 1px solid #ff5a67; }
        .sig-wait { background: #2a2e39; color: #787b86; }

        .dice-input-section { background: var(--surface); padding: 15px; border-radius: 12px; border: 1px solid var(--border); text-align: center; }
        .dice-inputs { display: flex; justify-content: center; gap: 10px; margin: 10px 0; }
        .dice-inputs input { width: 50px; height: 50px; text-align: center; font-size: 1.5rem; font-weight: bold; background: #1e222d; border: 2px solid var(--border); color: white; border-radius: 8px; }
        
        .log-container { background: var(--surface); border-radius: 12px; padding: 15px; border: 1px solid var(--border); }
        #historyList { height: 250px; overflow-y: auto; font-size: 0.85rem; margin-top: 10px; }
        .log-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #2a2e39; align-items: center; }
        
        .val-small { font-size: 0.7rem; color: #787b86; text-transform: uppercase; letter-spacing: 1px; }
        .btn-clear { background: none; border: 1px solid var(--red); color: var(--red); padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; }
        .btn-undo { background: none; border: 1px solid var(--orange); color: var(--orange); padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; margin-right: 5px; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        .modal.show { display: flex; }
        .modal-content { background: #1e222d; padding: 25px; border-radius: 15px; width: 90%; max-width: 380px; border: 1px solid var(--border); }
        select, input[type="number"] { width: 100%; padding: 12px; margin: 8px 0 15px; background: #131722; border: 1px solid #363a45; color: white; border-radius: 8px; }
        
        .blink { animation: blinker 1.2s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.1; } 
        }        

/* === KODE LOCK SCREEN PREMIUM (PERBAIKAN) === */
#lock-screen {
    position: fixed !important;
    inset: 0 !important; /* Menutup seluruh layar */
    background: var(--bg) !important;
    display: none; /* Akan diubah jadi 'flex' oleh JavaScript jika belum premium */
    flex-direction: column !important;
    justify-content: center !important; /* Tengahkan Vertikal */
    align-items: center !important;     /* Tengahkan Horizontal */
    z-index: 999999 !important; /* Pastikan di atas semua elemen */
    padding: 20px;
    text-align: center;
}

.lock-card {
    background: var(--surface);
    padding: 30px;
    border-radius: 20px;
    border: 1px solid var(--border);
    width: 100%;
    max-width: 350px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}

#app-pass {
    width: 100%;
    padding: 15px;
    background: #1e222d;
    border: 1px solid var(--border);
    color: white;
    border-radius: 10px;
    font-size: 1.2rem;
    text-align: center;
    margin: 20px 0;
    outline: none;
}

.btn-activate {
    width: 100%;
    padding: 15px;
    background: var(--green);
    color: white;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    font-size: 1rem;
    cursor: pointer;
}

    </style>
</head>
<body>
    <div id="lock-screen">
        <div class="lock-card">
            <h2 style="color: white; margin-bottom: 10px; font-size: 1.5rem;">PREMIUM ACCESS</h2>
            <p style="color: #888; margin-bottom: 0px; font-size: 0.9rem;">Masukkan kode aktivasi premium Anda</p>
            
            <input type="password" id="app-pass" placeholder="KODE AKTIVASI">
            
            <button class="btn-activate" onclick="checkPass()">AKTIVASI SEKARANG</button>
            
            <a href="https://wa.me/6282121218466" style="color: var(--green); display: block; margin-top: 20px; font-size: 14px; text-decoration: none;">
                Beli Lisensi Premium
            </a>
        </div>
    </div>

<div class="app-container">
    <div class="stats-header">
        <div>
            <div class="val-small">NET PROFIT (IDR)</div>
            <h2 id="netTotal">0</h2>
        </div>
        <button onclick="openSettings()" style="background:none; border:1px solid #363a45; color:#787b86; padding:8px 12px; border-radius:6px; cursor:pointer;">⚙️ SETUP</button>
    </div>

    <div class="card" style="background: linear-gradient(180deg, var(--surface) 0%, var(--bg) 100%);">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--border);">
            <div class="val-small">STATISTIK SESI</div>
            <div style="display: flex; gap: 20px;">
                <div style="text-align: right;">
                    <span style="font-size: 0.6rem; color: var(--green); display: block;">WIN</span>
                    <span id="totalWin" style="font-size: 1.2rem; font-weight: bold; color: var(--green);">0</span>
                </div>
                <div style="text-align: right;">
                    <span style="font-size: 0.6rem; color: var(--red); display: block;">LOSS</span>
                    <span id="totalLoss" style="font-size: 1.2rem; font-weight: bold; color: var(--red);">0</span>
                </div>
            </div>
        </div>
        <div id="check-items" style="font-size: 0.8rem; display: flex; flex-direction: column; gap: 8px;">
            <div style='text-align:center; opacity:0.5;'>Menunggu minimal 3 data dadu...</div>
        </div>
    </div>

    <div id="current-signal" class="sig-wait">MASUKKAN DATA AWAL</div>

    <div class="dice-input-section">
        <div class="dice-inputs">
            <input type="number" id="d1" min="1" max="6" placeholder="?">
            <input type="number" id="d2" min="1" max="6" placeholder="?">
            <input type="number" id="d3" min="1" max="6" placeholder="?">
        </div>
        <div id="stratLabel" class="val-small" style="color: var(--purple); font-weight:bold;">STRATEGY: Martingale</div>
    </div>

    <div class="log-container">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div class="val-small">HISTORI TRANSAKSI</div>
            <div>
                <button class="btn-undo" onclick="undoLast()">UNDO</button>
                <button class="btn-clear" onclick="clearData()">CLEAR</button>
            </div>
        </div>
        <div id="historyList"></div>
    </div>
</div>

<div id="settingsModal" class="modal">
    <div class="modal-content">
        <h3 style="color:white; margin-top:0;">Konfigurasi Bet & Keamanan</h3>
        
        <label class="val-small">BASE BET</label>
        <input type="number" id="baseBetInput">
        
        <label class="val-small">TARGET PROFIT (TP)</label>
        <input type="number" id="tpInput" placeholder="Misal: 500000">
        
        <label class="val-small">TRAILING STOP (TS)</label>
        <input type="number" id="tsInput" placeholder="Jaga profit jika turun (Misal: 100000)">

        <label class="val-small">STRATEGI</label>
        <select id="strategySelect">
            <option value="martingale">Martingale</option>
            <option value="parlay">Parlay</option>
            <option value="1326">System 1-3-2-6</option>
            <option value="dalembert">D'Alembert</option>
        </select>
        
        <button onclick="saveSettings()" style="width:100%; padding:12px; background:var(--purple); color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer; margin-top:10px;">SIMPAN PERUBAHAN</button>
        <button onclick="closeSettings()" style="background:none; border:none; color:#5d606b; width:100%; margin-top:10px; cursor:pointer;">Batal</button>
    </div>
</div>
